name: Bug report
description: Report a problem with the plugin or Stitch workflow
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, prompt, and relevant Stitch MCP behavior.
      placeholder: |
        1. Run ...
        2. Ask Codex ...
        3. See ...
    validations:
      required: true
  - type: input
    id: codex-version
    attributes:
      label: Codex version
      placeholder: codex --version
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      render: text
